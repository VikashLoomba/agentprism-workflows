# Token-less release via npm OIDC trusted publishing + Changesets.
#
# On push to main, changesets/action either opens/updates a "Version Packages"
# PR (while changesets are pending) or — once that PR is merged — publishes the
# bumped packages. Publishing uses OIDC (id-token + NPM_CONFIG_PROVENANCE, no
# npm token), which requires a trusted publisher configured on npmjs.com for
# each @automatalabs package pointing at this repo + this workflow file
# (.github/workflows/release.yml). With no pending changesets and all versions
# already on the registry, the run is a safe no-op. workflow_dispatch is kept
# for manual runs.

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Required for the Changesets release PR (contents + pull-requests) and for
# npm provenance via OIDC trusted publishing (id-token).
permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version / publish (@automatalabs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          # registry-url writes the .npmrc the publish step reads; required for
          # provenance / OIDC trusted publishing to target the public registry.
          registry-url: https://registry.npmjs.org

      # npm OIDC trusted publishing needs the npm CLI >= 11.5.1 to do the token
      # exchange. Node 22 ships npm 10, which fails the publish with a misleading
      # E404 ("is not in this registry") even with id-token + a configured trusted
      # publisher. `changeset publish` performs the OIDC exchange through this npm.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      # Same frozen install as CI: restores the exact dependency tree (incl. the
      # @automatalabs/codex-acp fork) and fetches the linux-x64 native binaries
      # (ubuntu glibc x64, no --no-optional).
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (project references)
        run: pnpm -r exec tsc -b

      # changesets/action opens/updates a "Version Packages" PR (running the
      # root `version` script = `changeset version`); when that PR is merged it
      # runs `publish` = the root `release` script (`pnpm build && changeset
      # publish`). With pnpm, `changeset publish` invokes `pnpm publish` per
      # changed package with `--no-git-checks` and `--access public` (from
      # .changeset/config.json access:public + each package's publishConfig);
      # NPM_CONFIG_PROVENANCE=true + the id-token permission emit npm provenance
      # via OIDC trusted publishing.
      - name: Create release PR / publish
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
          # OIDC trusted publishing needs no NPM token. If you instead publish
          # with a classic automation token, expose it here as:
          #   NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
